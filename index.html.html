<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Sınıf Matematik Soru Bankası | Maarif Modeli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8E7;
    --ink: #1F2937;
    --ink-soft: #4B5563;
    --paper: #FFFFFF;
    --primary: #FF6B6B;
    --primary-dark: #E63946;
    --secondary: #4ECDC4;
    --accent: #FFD93D;
    --purple: #A78BFA;
    --green: #6BCB77;
    --red: #FF5252;
    --easy: #6BCB77;
    --medium: #FFA94D;
    --hard: #FF6B6B;
    --shadow: rgba(31, 41, 55, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(circle at 20% 10%, rgba(255, 217, 61, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.12) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: var(--ink);
    color: var(--accent);
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 .accent {
    font-style: italic;
    font-weight: 500;
    color: var(--primary);
  }

  .subtitle {
    color: var(--ink-soft);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto;
  }

  .doodle {
    position: absolute;
    font-size: 2.5rem;
    opacity: 0.4;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
  }
  .doodle.d1 { top: 1rem; left: 5%; animation-delay: 0s; }
  .doodle.d2 { top: 3rem; right: 8%; animation-delay: 1s; }
  .doodle.d3 { top: 8rem; left: 12%; animation-delay: 2s; font-size: 2rem; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  /* CONTAINER */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* PROGRESS */
  .progress-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 1rem 1.25rem;
    margin: 1.5rem auto;
    max-width: 800px;
    box-shadow: 5px 5px 0 var(--ink);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .progress-stat {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .progress-stat .num {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
  }
  .progress-stat.green .num { color: var(--green); }
  .progress-stat.red .num { color: var(--red); }
  .progress-stat.yellow .num { color: var(--medium); }

  .reset-btn {
    margin-left: auto;
    background: transparent;
    border: 2px solid var(--ink);
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: var(--ink); color: var(--accent); }

  /* KAZANIM GRID */
  .kazanim-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin: 2rem 0;
  }

  .kazanim-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 5px 5px 0 var(--ink);
    position: relative;
    overflow: hidden;
  }

  .kazanim-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--ink);
  }

  .kazanim-card.completed {
    background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
  }

  .kazanim-card.completed::after {
    content: '✓';
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 28px;
    height: 28px;
    background: var(--green);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1rem;
  }

  .kazanim-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--paper);
    background: var(--ink);
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    margin-bottom: 0.5rem;
  }
  .kazanim-card[data-area="sayilar"] .kazanim-tag { background: var(--primary); }
  .kazanim-card[data-area="islemler"] .kazanim-tag { background: var(--purple); }
  .kazanim-card[data-area="geometri"] .kazanim-tag { background: var(--secondary); }
  .kazanim-card[data-area="olcme"] .kazanim-tag { background: var(--medium); }
  .kazanim-card[data-area="veri"] .kazanim-tag { background: var(--green); }
  .kazanim-card[data-area="olasilik"] .kazanim-tag { background: #FF8FB1; }

  .kazanim-code {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }

  .kazanim-title {
    font-size: 0.9rem;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31, 41, 55, 0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg);
    max-width: 720px;
    width: 100%;
    border: 3px solid var(--ink);
    border-radius: 24px;
    padding: 1.75rem;
    margin: 2rem 0;
    box-shadow: 8px 8px 0 var(--ink);
    position: relative;
  }

  .close-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    transition: all 0.2s;
    z-index: 5;
  }
  .close-btn:hover { background: var(--primary); color: white; }

  .modal-header {
    border-bottom: 2px dashed var(--ink-soft);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    padding-right: 3rem;
  }

  .modal-code {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 800;
  }

  .modal-title {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin-top: 0.25rem;
  }

  /* MODAL SCORE */
  .modal-score {
    background: var(--ink);
    color: var(--paper);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .modal-score .score-num {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--accent);
  }

  /* QUESTION CARD */
  .question {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .difficulty-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    color: white;
    margin-bottom: 0.75rem;
  }
  .difficulty-tag.easy { background: var(--easy); }
  .difficulty-tag.medium { background: var(--medium); }
  .difficulty-tag.hard { background: var(--hard); }

  .question-text {
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 1rem;
    white-space: pre-line;
  }

  /* MULTIPLE CHOICE OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .option {
    background: #FAFAFA;
    border: 2px solid #E5E7EB;
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.95rem;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  .option:active:not(.locked) {
    transform: scale(0.98);
    background: #f0f0f0;
  }
  .option:hover:not(.locked) {
    border-color: var(--ink);
    transform: translateX(4px);
    background: white;
  }
  .option .opt-letter {
    background: var(--ink);
    color: var(--accent);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.85rem;
  }
  .option.correct {
    background: #d4edda;
    border-color: var(--green);
    animation: correctPulse 0.4s ease;
  }
  .option.correct .opt-letter { background: var(--green); color: white; }
  .option.wrong {
    background: #ffe0e0;
    border-color: var(--red);
    animation: wrongShake 0.4s ease;
  }
  .option.wrong .opt-letter { background: var(--red); color: white; }
  .option.show-correct {
    background: #d4edda;
    border-color: var(--green);
  }
  .option.show-correct .opt-letter { background: var(--green); color: white; }
  .option.locked { cursor: default; opacity: 0.85; }

  @keyframes correctPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 0.85rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.5;
    font-weight: 600;
    display: none;
    animation: slideDown 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.success { background: #d4edda; color: #155724; border: 2px solid var(--green); }
  .feedback.error { background: #ffe0e0; color: #721c24; border: 2px solid var(--red); }
  .feedback.info { background: #FFF3CD; color: #856404; border: 2px solid var(--accent); }

  /* OPEN-ENDED */
  .open-prompt {
    background: #fff5e0;
    border: 2px dashed var(--medium);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.75rem;
    font-size: 0.9rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }

  .btn {
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 0.55rem 1.1rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 2px 2px 0 var(--ink); }
  .btn.hint { background: var(--accent); }
  .btn.answer { background: var(--secondary); color: var(--ink); }
  .btn.thought { background: var(--purple); color: white; border-color: var(--purple); }
  .btn.retry { background: var(--medium); color: white; border-color: var(--medium); }
  .btn.done { background: var(--green); color: white; border-color: var(--green); }
  .btn.done.active { background: var(--ink); color: var(--accent); border-color: var(--ink); }

  .reveal {
    margin-top: 0.75rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.55;
    display: none;
    animation: slideDown 0.3s ease;
    white-space: pre-line;
  }
  .reveal.show { display: block; }
  .reveal.hint-box { background: #FFF3CD; border: 2px solid var(--accent); }
  .reveal.answer-box { background: #D1ECF1; border: 2px solid var(--secondary); }
  .reveal strong { font-weight: 700; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin: 1.5rem 0;
  }
  .filter-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--ink);
    color: var(--accent);
  }

  /* CONFETTI */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
    display: none;
  }
  .confetti-container.show { display: block; }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: fall 2s ease-out forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
  footer strong { font-family: 'Fraunces', serif; color: var(--primary); }

  @media (max-width: 600px) {
    .modal { padding: 1.25rem; }
    .progress-card { font-size: 0.8rem; }
    .progress-stat .num { font-size: 1.2rem; }
    .doodle { display: none; }
    .question { padding: 1rem; }
    .option { padding: 0.65rem 0.85rem; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <div class="doodle d1">🔢</div>
  <div class="doodle d2">📐</div>
  <div class="doodle d3">📊</div>
  <span class="badge">Türkiye Yüzyılı Maarif Modeli</span>
  <h1>5. Sınıf Matematik<br><span class="accent">Soru Bankası</span></h1>
  <p class="subtitle">Sayılardan geometriye kadar tüm konular! Anında geri bildirim al. 🚀</p>
</header>

<div class="container">

  <div class="progress-card">
    <div class="progress-stat">
      <span class="num" id="totalCount">0</span>
      <span>Çıktı</span>
    </div>
    <div class="progress-stat green">
      <span class="num" id="correctCount">0</span>
      <span>Doğru</span>
    </div>
    <div class="progress-stat red">
      <span class="num" id="wrongCount">0</span>
      <span>Yanlış</span>
    </div>
    <div class="progress-stat yellow">
      <span class="num" id="successRate">0%</span>
      <span>Başarı</span>
    </div>
    <button class="reset-btn" onclick="resetProgress()">↺ Sıfırla</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterArea('all', this)">Tümü</button>
    <button class="filter-btn" onclick="filterArea('sayilar', this)">🔢 Sayılar</button>
    <button class="filter-btn" onclick="filterArea('islemler', this)">➕ İşlemler</button>
    <button class="filter-btn" onclick="filterArea('geometri', this)">📐 Geometri</button>
    <button class="filter-btn" onclick="filterArea('olcme', this)">📏 Ölçme</button>
    <button class="filter-btn" onclick="filterArea('veri', this)">📊 Veri</button>
    <button class="filter-btn" onclick="filterArea('olasilik', this)">🎲 Olasılık</button>
  </div>

  <div class="kazanim-grid" id="kazanimGrid"></div>
</div>

<footer>
  <p>Hazırlayan: <strong>@jasmin.eduflow</strong> · Müfredat: 2025-2026 MEB Maarif Modeli</p>
</footer>

<div class="confetti-container" id="confetti"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ============= SORU BANKASI =============
// type: "mc" = multiple choice (çoktan seçmeli), "open" = açık uçlu
const KAZANIMLAR = [

  // ============ SAYILAR ============
  {
    code: "MAT.5.1.1",
    area: "sayilar",
    areaLabel: "SAYILAR VE İŞLEMLER",
    title: "Altı basamaklı sayıları okuma ve yazma",
    questions: [
      {
        difficulty: "easy", type: "mc",
        text: "352.847 sayısı nasıl okunur?",
        options: [
          "Üç yüz elli iki bin sekiz yüz kırk yedi",
          "Üç bin beş yüz iki bin sekiz yüz kırk yedi",
          "Otuz beş bin iki yüz seksen dört bin yedi",
          "Üç milyon beş yüz iki bin sekiz yüz kırk yedi"
        ],
        correct: 0,
        hint: "Sayıyı sağdan başlayarak 3'lü gruplara ayır: 352 / 847. Önce solu (bin), sonra sağı oku.",
        explanation: "352.847 = 352 BİN 847\n\n• 352 → üç yüz elli iki BİN\n• 847 → sekiz yüz kırk yedi\n\nDoğru okunuş: «üç yüz elli iki bin sekiz yüz kırk yedi»"
      },
      {
        difficulty: "medium", type: "mc",
        text: "«Yetmiş beş bin altı yüz» sayısının rakamla yazılışı hangisidir?",
        options: ["75.060", "75.600", "750.600", "7.560"],
        correct: 1,
        hint: "Yetmiş beş BİN = 75.000. Buna altı yüz ekle.",
        explanation: "Yetmiş beş BİN = 75.000\nAltı yüz = 600\nToplam: 75.000 + 600 = 75.600 ✓\n\nDikkat: «altmış» ile «altı yüz» farklıdır!"
      },
      {
        difficulty: "hard", type: "open",
        text: "Aşağıdaki sayıyı:\n• Rakamla yaz\n• Basamak adlarını söyle\n• En büyük basamağındaki rakamın değerini yaz\n\nSayı: «Dört yüz seksen iki bin altı yüz on beş»",
        prompt: "📝 Üç sorunun cevabını defterine yaz, sonra butona bas.",
        hint: "Önce 'bin'den önceyi ve sonrasını ayır. 482 BİN + 615.\nBasamaklar sağdan: birler, onlar, yüzler, binler, on binler, yüz binler",
        explanation: "Çözüm:\n\n1) Rakamla yazılışı: 482.615\n\n2) Basamaklar (sağdan sola):\n• 5 → birler\n• 1 → onlar\n• 6 → yüzler\n• 2 → binler\n• 8 → on binler\n• 4 → yüz binler\n\n3) En büyük basamak: 4 (yüz binler basamağı)\n   Değeri: 4 × 100.000 = 400.000\n\n💡 Günlük hayat: Banka cüzdanında, fatura tutarlarında, nüfus sayılarında bu sayılarla karşılaşırsın."
      }
    ]
  },

  {
    code: "MAT.5.1.2",
    area: "sayilar",
    areaLabel: "SAYILAR VE İŞLEMLER",
    title: "Doğal sayılarla işlem ve gerçek yaşam problemleri",
    questions: [
      {
        difficulty: "easy", type: "mc",
        text: "Bir markette 248 elma ve 175 portakal vardır. Bunların TOPLAMI kaç meyvedir?",
        options: ["323", "413", "423", "433"],
        correct: 2,
        hint: "Toplama yap: 248 + 175 = ?",
        explanation: "248 + 175 = 423\n\n   248\n + 175\n ─────\n   423"
      },
      {
        difficulty: "medium", type: "mc",
        text: "Ali'nin 580 lirası vardı. Önce 235 liralık bir kitap, sonra 128 liralık bir defter aldı. Geriye kaç lirası kalır?",
        options: ["205 lira", "215 lira", "217 lira", "225 lira"],

// ============= APP STATE =============

// HELPER: ID için kod temizleme (noktaları tireye çevir)
function cleanId(code) { return code.replace(/\./g, '-'); }


const grid = document.getElementById('kazanimGrid');
const overlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');
let currentFilter = 'all';

// Motivasyon mesajları
const CORRECT_MESSAGES = [
  "🎉 Harika! Doğru cevap!",
  "✨ Süpersin! Tam isabet!",
  "🌟 Mükemmel! Başardın!",
  "👏 Bravo! Çok iyi düşündün!",
  "🚀 Tebrikler! Doğru yoldasın!",
  "💪 Aynen öyle! Çok güzel!",
  "🏆 İşte bu! Başarılısın!"
];

const WRONG_MESSAGES = [
  "🤔 Bir daha düşünmek ister misin? Yanlış oldu ama vazgeçme!",
  "💭 Tam olmadı, ama denemekten çekinme. Tekrar dene!",
  "🌱 Yanlış cevap, ama her hata bir öğrenme fırsatıdır!",
  "📚 Sorun değil! İpucuna bakıp tekrar dene.",
  "💡 Yanlış oldu — bir kez daha oku, fark edeceksin!",
  "🎯 Hedefi ıskaladın ama merak etme, sonraki vuruş senin!"
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============= STORAGE =============
function getProgress() {
  try {
    return JSON.parse(localStorage.getItem('progress') || '{}');
  } catch { return {}; }
}

function setProgress(p) {
  try { localStorage.setItem('progress', JSON.stringify(p)); } catch {}
}

function getQuestionStatus(code, qIdx) {
  const p = getProgress();
  return p[`${code}_${qIdx}`]; // "correct" | "wrong" | undefined
}

function setQuestionStatus(code, qIdx, status) {
  const p = getProgress();
  p[`${code}_${qIdx}`] = status;
  setProgress(p);
  renderProgress();
}

function isKazanimCompleted(code) {
  const k = KAZANIMLAR.find(x => x.code === code);
  if (!k) return false;
  // Tüm sorulara CEVAP VERİLMİŞ mi (doğru veya yanlış fark etmez)
  for (let i = 0; i < k.questions.length; i++) {
    if (!getQuestionStatus(code, i)) return false;
  }
  return true;
}

// ============= PROGRESS =============
function renderProgress() {
  const p = getProgress();
  const values = Object.values(p);
  const correct = values.filter(v => v === 'correct').length;
  const wrong = values.filter(v => v === 'wrong').length;
  const total = correct + wrong;
  const rate = total ? Math.round((correct / total) * 100) : 0;
  document.getElementById('totalCount').textContent = KAZANIMLAR.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('successRate').textContent = rate + '%';
}

function resetProgress() {
  if (confirm('Tüm ilerlemeni sıfırlamak istediğine emin misin? Skorların ve cevaplama geçmişin silinir.')) {
    setProgress({});
    renderGrid();
    renderProgress();
  }
}

// ============= FILTER =============
function filterArea(area, btn) {
  currentFilter = area;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

// ============= GRID =============
function renderGrid() {
  const filtered = currentFilter === 'all'
    ? KAZANIMLAR
    : KAZANIMLAR.filter(k => k.area === currentFilter);

  grid.innerHTML = filtered.map(k => `
    <div class="kazanim-card ${isKazanimCompleted(k.code) ? 'completed' : ''}" 
         data-area="${k.area}" 
         onclick="openModal('${k.code}')">
      <span class="kazanim-tag">${k.areaLabel}</span>
      <div class="kazanim-code">${k.code}</div>
      <div class="kazanim-title">${k.title}</div>
    </div>
  `).join('');
}

// ============= MODAL =============
function openModal(code) {
  const k = KAZANIMLAR.find(x => x.code === code);
  if (!k) return;

  // Bu kazanımın skoru
  let modalCorrect = 0, modalAnswered = 0;
  for (let i = 0; i < k.questions.length; i++) {
    const s = getQuestionStatus(code, i);
    if (s) modalAnswered++;
    if (s === 'correct') modalCorrect++;
  }

  modalContent.innerHTML = `
    <button class="close-btn" onclick="closeModal()">×</button>
    <div class="modal-header">
      <span class="kazanim-tag" style="background: var(--ink); color: var(--accent);">${k.areaLabel}</span>
      <div class="modal-code">${k.code}</div>
      <div class="modal-title">${k.title}</div>
    </div>

    <div class="modal-score" id="modal-score">
      <span>📊 Bu konudaki skorun</span>
      <span><span class="score-num" id="m-correct">${modalCorrect}</span> / ${k.questions.length}</span>
    </div>

    ${k.questions.map((q, i) => renderQuestion(code, i, q)).join('')}
  `;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function renderQuestion(code, i, q) {
  const status = getQuestionStatus(code, i);
  const diffLabel = q.difficulty === 'easy' ? '🟢 KOLAY' : q.difficulty === 'medium' ? '🟡 ORTA' : '🔴 ZOR';

  if (q.type === 'mc') {
    return `
      <div class="question" id="q-${cleanId(code)}-${i}">
        <span class="difficulty-tag ${q.difficulty}">${diffLabel}</span>
        <div class="question-text">${q.text}</div>
        <div class="options" id="opts-${cleanId(code)}-${i}">
          ${q.options.map((opt, oi) => `
            <button class="option ${status ? 'locked answered' : ''}" 
                    onclick="selectOption('${code}', ${i}, ${oi})"
                    ontouchend="event.preventDefault(); selectOption('${code}', ${i}, ${oi})"
                    data-idx="${oi}"
                    type="button">
              <span class="opt-letter">${String.fromCharCode(65 + oi)}</span>
              <span class="opt-text">${opt}</span>
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="fb-${cleanId(code)}-${i}"></div>
        <div class="actions">
          <button class="btn hint" onclick="toggleReveal('hint-' + cleanId(code) + '-' + i)">💡 İpucu</button>
          ${status ? `<button class="btn retry" onclick="retryQuestion('${code}', ${i})">↺ Tekrar Dene</button>` : ''}
        </div>
        <div class="reveal hint-box" id="hint-${cleanId(code)}-${i}">
          <strong>İPUCU:</strong><br>${q.hint}
        </div>
      </div>
    `;
  } else {
    // open-ended
    return `
      <div class="question" id="q-${cleanId(code)}-${i}">
        <span class="difficulty-tag ${q.difficulty}">${diffLabel}</span>
        <div class="question-text">${q.text}</div>
        <div class="open-prompt">${q.prompt || '📝 Cevabını defterine yaz, hazır olduğunda butona bas.'}</div>
        <div class="actions">
          <button class="btn hint" onclick="toggleReveal('hint-' + cleanId(code) + '-' + i)">💡 İpucu</button>
          <button class="btn thought" onclick="showOpenAnswer('${code}', ${i})">✍️ Cevabımı Düşündüm, Doğrusunu Göster</button>
        </div>
        <div class="reveal hint-box" id="hint-${cleanId(code)}-${i}">
          <strong>İPUCU:</strong><br>${q.hint}
        </div>
        <div class="reveal answer-box" id="ans-${cleanId(code)}-${i}">
          <strong>📖 ÖRNEK CEVAP:</strong><br>${q.explanation}
        </div>
        <div class="feedback info" id="fb-${cleanId(code)}-${i}" ${status === 'correct' ? 'style="display:block"' : ''}>
          ✨ Tebrikler, bu soruyu düşündüğünü kaydettim!
        </div>
      </div>
    `;
  }
}

// ============= ANSWER LOGIC =============
function selectOption(code, i, optIdx) {
  // Eğer zaten cevap verilmişse, dokunma
  const existingStatus = getQuestionStatus(code, i);
  if (existingStatus) return;
  
  const k = KAZANIMLAR.find(x => x.code === code);
  const q = k.questions[i];
  const isCorrect = optIdx === q.correct;
  
  // Lock all options
  const opts = document.querySelectorAll(`#opts-${cleanId(code)}-${i} .option`);
  opts.forEach(o => o.classList.add('locked'));
  
  // Mark selected
  if (isCorrect) {
    opts[optIdx].classList.add('correct');
    showFeedback(code, i, pick(CORRECT_MESSAGES) + ' ' + q.explanation, 'success');
    setQuestionStatus(code, i, 'correct');
    if (q.difficulty === 'hard') triggerConfetti();
  } else {
    opts[optIdx].classList.add('wrong');
    opts[q.correct].classList.add('show-correct');
    showFeedback(code, i, pick(WRONG_MESSAGES) + '\n\n📖 Doğru cevap açıklaması: ' + q.explanation, 'error');
    setQuestionStatus(code, i, 'wrong');
  }

  // Modal skoru güncelle
  let mc = 0;
  for (let j = 0; j < k.questions.length; j++) {
    if (getQuestionStatus(code, j) === 'correct') mc++;
  }
  const mcEl = document.getElementById('m-correct');
  if (mcEl) mcEl.textContent = mc;

  // Add retry button
  const actions = document.querySelector(`#q-${cleanId(code)}-${i} .actions`);
  if (actions && !actions.querySelector('.btn.retry')) {
    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn retry';
    retryBtn.textContent = '↺ Tekrar Dene';
    retryBtn.onclick = () => retryQuestion(code, i);
    actions.appendChild(retryBtn);
  }
}

function showFeedback(code, i, msg, type) {
  const fb = document.getElementById(`fb-${cleanId(code)}-${i}`);
  if (fb) {
    fb.textContent = msg;
    fb.className = `feedback ${type} show`;
    fb.style.whiteSpace = 'pre-line';
  }
}

function showOpenAnswer(code, i) {
  const ans = document.getElementById(`ans-${cleanId(code)}-${i}`);
  if (ans) ans.classList.add('show');
  setQuestionStatus(code, i, 'correct'); // open-ended otomatik "tamamlandı"
  const fb = document.getElementById(`fb-${cleanId(code)}-${i}`);
  if (fb) fb.style.display = 'block';
  
  const k = KAZANIMLAR.find(x => x.code === code);
  let mc = 0;
  for (let j = 0; j < k.questions.length; j++) {
    if (getQuestionStatus(code, j) === 'correct') mc++;
  }
  const mcEl = document.getElementById('m-correct');
  if (mcEl) mcEl.textContent = mc;
}

function retryQuestion(code, i) {
  // Skoru SADECE BU SORU için sıfırla (yanlış olarak işaretliyse silinsin)
  const p = getProgress();
  delete p[`${code}_${i}`];
  setProgress(p);
  
  // Soruyu yeniden render et
  const k = KAZANIMLAR.find(x => x.code === code);
  const qDiv = document.getElementById(`q-${cleanId(code)}-${i}`);
  if (qDiv) {
    qDiv.outerHTML = renderQuestion(code, i, k.questions[i]);
  }
  
  // Modal skoru güncelle
  let mc = 0;
  for (let j = 0; j < k.questions.length; j++) {
    if (getQuestionStatus(code, j) === 'correct') mc++;
  }
  const mcEl = document.getElementById('m-correct');
  if (mcEl) mcEl.textContent = mc;
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  renderGrid();
  renderProgress();
}

function toggleReveal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show');
}

// ============= CONFETTI (zor doğru cevapta) =============
function triggerConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  container.classList.add('show');
  const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#A78BFA', '#6BCB77'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    c.style.animationDuration = (1.5 + Math.random()) + 's';
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    container.appendChild(c);
  }
  setTimeout(() => container.classList.remove('show'), 2500);
}

// ============= EVENTS =============
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
renderProgress();
renderGrid();
</script>
